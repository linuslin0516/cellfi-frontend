<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD54F"/>
      <stop offset="100%" style="stop-color:#F0B90B"/>
    </linearGradient>
    <radialGradient id="outerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#F0B90B;stop-opacity:0.35"/>
      <stop offset="60%" style="stop-color:#F0B90B;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#F0B90B;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer glow -->
  <circle cx="256" cy="256" r="220" fill="url(#outerGlow)" filter="url(#softGlow)"/>

  <!-- Main cell -->
  <circle cx="256" cy="256" r="130" fill="url(#gold)" filter="url(#glow)" opacity="0.95"/>

  <!-- Cell highlight -->
  <circle cx="220" cy="220" r="38" fill="white" opacity="0.2"/>
  <circle cx="208" cy="208" r="16" fill="white" opacity="0.15"/>

  <!-- Small orbiting cells -->
  <circle cx="115" cy="155" r="18" fill="#00B8D9" opacity="0.7" filter="url(#glow)"/>
  <circle cx="111" cy="151" r="5" fill="white" opacity="0.2"/>

  <circle cx="400" cy="230" r="25" fill="#00B8D9" opacity="0.65" filter="url(#glow)"/>
  <circle cx="395" cy="224" r="6" fill="white" opacity="0.2"/>

  <circle cx="115" cy="330" r="13" fill="#CF304A" opacity="0.6" filter="url(#glow)"/>

  <circle cx="360" cy="115" r="11" fill="#F0B90B" opacity="0.5"/>
  <circle cx="160" cy="410" r="10" fill="#F0B90B" opacity="0.4"/>

  <circle cx="390" cy="370" r="12" fill="#03A66D" opacity="0.55"/>
  <circle cx="320" cy="420" r="9" fill="#03A66D" opacity="0.45"/>

  <!-- Tiny sparkle dots -->
  <circle cx="150" cy="105" r="3" fill="#F0B90B" opacity="0.6"/>
  <circle cx="420" cy="160" r="3" fill="#F0B90B" opacity="0.4"/>
  <circle cx="80" cy="260" r="2.5" fill="#F0B90B" opacity="0.5"/>
  <circle cx="440" cy="310" r="2.5" fill="#F0B90B" opacity="0.3"/>
</svg>
